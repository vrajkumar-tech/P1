name: Realtime Load Testing & Matrix Verification

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Test duration in minutes'
        required: false
        default: '5'
      concurrent_users:
        description: 'Number of concurrent users'
        required: false
        default: '100'
  schedule:
    - cron: '0 */2 * * *'  # Run every 6 hours

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hostname: 
          - 'https://opp-loans.web.app'
          - 'https://opploans.static2.website'
          - 'https://opploans.netlify.app'
      fail-fast: false
      max-parallel: 3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios p-limit cli-progress chalk

      - name: Run Load Test for ${{ matrix.hostname }}
        env:
          TARGET_HOST: ${{ matrix.hostname }}
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '5' }}
          CONCURRENT_USERS: ${{ github.event.inputs.concurrent_users || '100' }}
        run: node load-test.js

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results-${{ strategy.job-index }}
          path: |
            test-results-*.json
            test-report-*.html
          retention-days: 30

  aggregate-results:
    needs: load-test-matrix
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install dependencies
        run: |
          npm init -y
          npm install chalk

      - name: Aggregate and Report Results
        run: node aggregate-results.js

      - name: Upload Aggregated Report
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-load-test-report
          path: |
            aggregated-report.json
            aggregated-report.html
          retention-days: 90

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('aggregated-report.json', 'utf8'));
            
            let comment = '## 🚀 Load Test Results\n\n';
            comment += `**Total Requests**: ${report.totalRequests}\n`;
            comment += `**Success Rate**: ${report.successRate}%\n`;
            comment += `**Average Response Time**: ${report.avgResponseTime}ms\n\n`;
            comment += '### Per-Host Results\n\n';
            
            for (const [host, stats] of Object.entries(report.hostStats)) {
              comment += `#### ${host}\n`;
              comment += `- Requests: ${stats.requests}\n`;
              comment += `- Success: ${stats.success}\n`;
              comment += `- Failures: ${stats.failures}\n`;
              comment += `- Avg Response: ${stats.avgResponse}ms\n\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
