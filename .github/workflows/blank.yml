name: RSS Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Run every hour

jobs:
  rss-blog-generator:
    runs-on: ubuntu-latest
    environment: github-pages
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Create scripts directory
        run: mkdir -p scripts

      - name: Create RSS Blog Generator
        run: |
          cat > scripts/rss_blog_generator.py << 'EOF'
          #!/usr/bin/env python3
          """
          RSS to Blog Post Generator
          Fetches RSS feeds from configured sources and generates blog posts
          """

          import feedparser
          import requests
          import json
          import os
          import re
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime, timedelta, timezone
          from typing import List, Dict, Optional
          import logging
          from bs4 import BeautifulSoup

          # Configure logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')
          logger = logging.getLogger(__name__)

          class RSSBlogGenerator:
              def __init__(self):
                  self.rss_feeds = [
                      "https://www.theverge.com/rss/index.xml",
                      "https://openai.com/blog/rss.xml",
                      "https://openai.com/news/rss.xml"
                  ]
                  self.base_url = "https://rkoots.github.io/blog/"
                  self.author = "rkoots"
                  
              def fetch_feed_entries(self, feed_url: str) -> List[Dict]:
                  """Fetch and parse RSS feed entries"""
                  try:
                      logger.info(f"Fetching feed: {feed_url}")
                      feed = feedparser.parse(feed_url)
                      entries = []
                      
                      for entry in feed.entries:
                          # Parse publication date with timezone handling
                          pub_date = None
                          if hasattr(entry, 'published_parsed') and entry.published_parsed:
                              pub_date = datetime(*entry.published_parsed[:6], tzinfo=timezone.utc)
                          elif hasattr(entry, 'updated_parsed') and entry.updated_parsed:
                              pub_date = datetime(*entry.updated_parsed[:6], tzinfo=timezone.utc)
                          else:
                              pub_date = datetime.now(timezone.utc)
                          
                          # Get description with proper fallback
                          description = ""
                          if hasattr(entry, 'description'):
                              description = entry.description
                          elif hasattr(entry, 'summary'):
                              description = entry.summary
                          
                          entries.append({
                              'title': entry.title,
                              'link': entry.link,
                              'description': description,
                              'pub_date': pub_date,
                              'source': feed_url
                          })
                      
                      logger.info(f"Found {len(entries)} entries in {feed_url}")
                      return entries
                      
                  except Exception as e:
                      logger.error(f"Error fetching feed {feed_url}: {str(e)}")
                      return []
              
              def fetch_article_content(self, url: str) -> Optional[str]:
                  """Fetch full article content from URL"""
                  try:
                      headers = {
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                      }
                      response = requests.get(url, headers=headers, timeout=30)
                      response.raise_for_status()
                      
                      soup = BeautifulSoup(response.content, 'html.parser')
                      
                      # Remove script and style elements
                      for script in soup(["script", "style"]):
                          script.decompose()
                      
                      # Try to find main content
                      content_selectors = [
                          'article',
                          '.article-content',
                          '.post-content',
                          '.entry-content',
                          'main',
                          '.content'
                      ]
                      
                      content = None
                      for selector in content_selectors:
                          content = soup.select_one(selector)
                          if content:
                              break
                      
                      if not content:
                          # Fallback to body content
                          content = soup.find('body')
                      
                      if content:
                          # Clean up text
                          text = content.get_text(separator='\n', strip=True)
                          # Remove excessive whitespace
                          text = re.sub(r'\n\s*\n', '\n\n', text)
                          return text[:5000]  # Limit content length
                      
                  except Exception as e:
                      logger.error(f"Error fetching content from {url}: {str(e)}")
                  
                  return None
              
              def filter_recent_entries(self, entries: List[Dict], hours: int = 1) -> List[Dict]:
                  """Filter entries from the last N hours"""
                  cutoff_time = datetime.now(timezone.utc) - timedelta(hours=hours)
                  recent_entries = []
                  
                  for entry in entries:
                      if entry['pub_date'] > cutoff_time:
                          recent_entries.append(entry)
                  
                  logger.info(f"Found {len(recent_entries)} entries from the last {hours} hour(s)")
                  return recent_entries
              
              def get_latest_entries(self, entries: List[Dict], count: int = 10) -> List[Dict]:
                  """Get the latest N entries sorted by publication date"""
                  # Sort by publication date (newest first)
                  sorted_entries = sorted(entries, key=lambda x: x['pub_date'], reverse=True)
                  latest_entries = sorted_entries[:count]
                  
                  logger.info(f"Selected latest {len(latest_entries)} entries")
                  return latest_entries
              
              def send_email(self, blog_posts: List[str]) -> bool:
                  """Send blog posts via email"""
                  try:
                      # Email configuration (using environment variables)
                      smtp_server = os.getenv('SMTP_SERVER', 'smtp.gmail.com')
                      smtp_port = int(os.getenv('SMTP_PORT', '587'))
                      sender_email = os.getenv('SENDER_EMAIL', 'market007ads@gmail.com')
                      sender_password = os.getenv('SENDER_PASSWORD', '')
                      recipient_email = os.getenv('RECIPIENT_EMAIL', 'rkoots.rkoots_autobot@blogger.com')
                      
                      if not sender_password:
                          logger.error("Sender password not configured")
                          return False
                      
                      # Create message
                      msg = MIMEMultipart('alternative')
                      msg['Subject'] = f"Auto-Generated Blog Posts - {datetime.now().strftime('%Y-%m-%d %H:%M')}"
                      msg['From'] = sender_email
                      msg['To'] = recipient_email
                      
                      # Create email body
                      email_body = f"""
          <!DOCTYPE html>
          <html>
          <head>
              <style>
                  body {{ font-family: Arial, sans-serif; line-height: 1.6; color: #333; }}
                  .post {{ border: 1px solid #ddd; margin: 20px 0; padding: 20px; border-radius: 5px; }}
                  .title {{ color: #2c3e50; font-size: 18px; font-weight: bold; margin-bottom: 10px; }}
                  .meta {{ color: #7f8c8d; font-size: 12px; margin-bottom: 15px; }}
                  .content {{ margin-bottom: 15px; }}
                  .readmore {{ color: #3498db; text-decoration: none; }}
                  .footer {{ margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #7f8c8d; }}
              </style>
          </head>
          <body>
              <h2>Auto-Generated Blog Posts</h2>
              <p>Generated on: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}</p>
              
              {"".join(blog_posts)}
              
              <div class="footer">
                  <p>This email was automatically generated by the RSS Blog Generator.</p>
                  <p>Visit our blog: <a href="{self.base_url}">{self.base_url}</a></p>
              </div>
          </body>
          </html>
          """
                      
                      msg.attach(MIMEText(email_body, 'html'))
                      
                      # Send email
                      logger.info(f"Sending email to {recipient_email}")
                      server = smtplib.SMTP(smtp_server, smtp_port)
                      server.starttls()
                      server.login(sender_email, sender_password)
                      server.send_message(msg)
                      server.quit()
                      
                      logger.info("Email sent successfully")
                      return True
                      
                  except Exception as e:
                      logger.error(f"Error sending email: {str(e)}")
                      return False
              
              def format_blog_post_for_email(self, title: str, content: str, link: str, pub_date: datetime) -> str:
                  """Format blog post for email HTML"""
                  return f"""
          <div class="post">
              <div class="title">{title}</div>
              <div class="meta">Published: {pub_date.strftime('%B %d, %Y at %H:%M')}</div>
              <div class="content">{content[:500]}...</div>
              <a href="{self.base_url}" class="readmore">Read more on our blog</a> | 
              <a href="{link}" class="readmore">Original article</a>
          </div>
          """
              
              def run(self):
                  """Main execution function"""
                  logger.info("Starting RSS Blog Generator")
                  
                  all_entries = []
                  
                  # Fetch all RSS feeds
                  for feed_url in self.rss_feeds:
                      entries = self.fetch_feed_entries(feed_url)
                      all_entries.extend(entries)
                  
                  # Filter recent entries (last 1 hour)
                  recent_entries = self.filter_recent_entries(all_entries, 1)
                  
                  # If no recent entries, get latest 10 entries as fallback
                  if not recent_entries:
                      logger.info("No recent entries found. Using latest 10 entries as fallback.")
                      recent_entries = self.get_latest_entries(all_entries, 10)
                  
                  if not recent_entries:
                      logger.info("No entries found at all. Skipping email.")
                      return
                  
                  # Generate email content
                  email_posts = []
                  for entry in recent_entries:
                      # Fetch full content for better email content
                      full_content = self.fetch_article_content(entry['link'])
                      content_to_use = full_content if full_content else entry['description']
                      
                      email_post = self.format_blog_post_for_email(
                          entry['title'],
                          content_to_use,
                          entry['link'],
                          entry['pub_date']
                      )
                      email_posts.append(email_post)
                  
                  # Send email
                  success = self.send_email(email_posts)
                  
                  if success:
                      logger.info(f"Successfully processed {len(recent_entries)} blog posts")
                  else:
                      logger.error("Failed to send email")

          if __name__ == "__main__":
              generator = RSSBlogGenerator()
              generator.run()
          EOF

      - name: Run RSS Blog Generator
        env:
          SENDER_EMAIL: market007ads@gmail.com
          SENDER_PASSWORD: ${{ secrets.GMAIL_PWD }}
          RECIPIENT_EMAIL: rkoots.rkoots_autobot@blogger.com
        run: python scripts/rss_blog_generator.py
