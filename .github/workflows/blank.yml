name: RSS Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Run every hour

jobs:
  rss-blog-generator:
    runs-on: ubuntu-latest
    environment: github-pages
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run RSS Blog Generator
        env:
          SENDER_EMAIL: market007ads@gmail.com
          SENDER_PASSWORD: ${{ secrets.GMAIL_PWD }}
          RECIPIENT_EMAIL: rkoots.rkoots_autobot@blogger.com
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash
        run: python scripts/rss_blog_generator.py
